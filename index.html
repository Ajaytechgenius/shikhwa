<!DOCTYPE html>
<html>
<head>
<style>
  body{
    background:#0b0c0f;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:'Manrope', sans-serif;
  }

  .duo-btn{
    position: relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding: 18px 40px;
    border-radius: 100px;
    background: #e8c579; /* your gold-bright */
    color: #0b0c0f;
    font-weight:700;
    font-size:15px;
    text-decoration:none;
    overflow: hidden;
    isolation: isolate;
    cursor:pointer;
    border:none;
  }

  /* the expanding black circle */
  .duo-btn::before{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    width:20px;
    height:20px;
    background:#0b0c0f;
    border-radius:50%;
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.55s cubic-bezier(0.65,0,0.35,1);
    z-index:1;
  }

  /* the blurred glow that trails the wipe edge */
  .duo-btn::after{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    width:20px;
    height:20px;
    background: radial-gradient(circle, rgba(232,197,121,0.9) 0%, transparent 70%);
    filter: blur(14px);
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.55s cubic-bezier(0.65,0,0.35,1) 0.05s, opacity 0.55s ease 0.3s;
    z-index:1;
    opacity:0;
  }

  .duo-btn span{
    position:relative;
    z-index:2;
    transition: color 0.4s ease 0.15s;
  }

  .duo-btn:hover::before{
    transform: translate(-50%,-50%) scale(15);
  }

  .duo-btn:hover::after{
    transform: translate(-50%,-50%) scale(18);
    opacity:1;
  }

  .duo-btn:hover span{
    color: #e8c579;
  }
</style>
</head>
<body>

<button class="duo-btn">
  <span>Open App</span>
</button>

</body>
</html>
