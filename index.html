<!DOCTYPE html>
<html>
<head>
<style>
body{ background:#0d0f14; display:flex; gap:20px; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }

.btn-fill{
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 17px 36px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  overflow: hidden;
  isolation: isolate;
  background: #e8c579;
  transform: translateZ(0); /* forces clean compositing, stops blur/clip bleed */
}

.btn-fill .fringe,
.btn-fill .fill{
  position:absolute;
  inset:-3px;                 /* bleeds slightly past the edge — kills the hairline */
  border-radius: inherit;
  clip-path: circle(0% at var(--x,50%) var(--y,50%));
}

.btn-fill .fringe{
  background: conic-gradient(from 90deg, #7dd3fc, #e8c579, #d98850, #7dd3fc);
  transition: clip-path 0.6s cubic-bezier(0.22,1,0.36,1);
  z-index:1;
  mix-blend-mode: screen;
}

.btn-fill .fill{
  background: #0d0f14;
  transition: clip-path 0.55s cubic-bezier(0.22,1,0.36,1) 0.04s;
  z-index:2;
}

.btn-fill:hover .fringe{ clip-path: circle(200% at var(--x,50%) var(--y,50%)); }
.btn-fill:hover .fill{ clip-path: circle(195% at var(--x,50%) var(--y,50%)); }

.btn-fill span{
  position:relative; z-index:3;
  color:#0d0f14; font-weight:700; font-size:14px;
  transition: color 0.4s ease 0.1s;
}
.btn-fill:hover span{ color:#e8c579; }

/* punchy solid chips — no thin outline */
.chip{
  display:inline-flex; align-items:center; gap:6px;
  background: #e8c579;
  color:#0d0f14;
  font-weight:700;
  font-size:12px;
  letter-spacing:0.04em;
  padding:10px 18px;
  border-radius:100px;
}
</style>
</head>
<body>

<button class="btn-fill">
  <span class="fringe"></span><span class="fill"></span>
  <span>Open App</span>
</button>

<div class="chip">FREE TRIAL CLASS</div>

<script>
document.querySelectorAll('.btn-fill').forEach(btn=>{
  const set = e=>{
    const r = btn.getBoundingClientRect();
    btn.style.setProperty('--x', ((e.clientX-r.left)/r.width)*100+'%');
    btn.style.setProperty('--y', ((e.clientY-r.top)/r.height)*100+'%');
  };
  btn.addEventListener('mouseenter', set);
});
</script>
</body>
</html>
