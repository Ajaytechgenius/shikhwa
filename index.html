/* =========================================================
   BUTTON — clean two-tone wipe (green -> black), fully wired
   No blur, no fringe, no seam artifacts.
========================================================= */
.btn-fill{
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 17px 38px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  overflow: hidden;
  isolation: isolate;
  background: var(--green);
  transform: translateZ(0);
  box-shadow: 0 10px 28px rgba(46,204,113,0.32);
  text-decoration:none;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.btn-fill:hover{
  transform: translateY(-2px);
  box-shadow: 0 16px 38px rgba(13,15,20,0.28);
}

.btn-fill .fill{
  position:absolute;
  inset:-3px;
  border-radius: inherit;
  background: var(--ink);
  clip-path: circle(0% at var(--x,50%) var(--y,50%));
  transition: clip-path 0.55s cubic-bezier(0.22,1,0.36,1);
  z-index:1;
}
.btn-fill:hover .fill{
  clip-path: circle(200% at var(--x,50%) var(--y,50%));
}

.btn-fill span, .btn-fill svg{
  position: relative;
  z-index: 2;
  color: var(--ink);
  font-weight:700;
  font-size:14px;
  transition: color 0.4s ease 0.08s, stroke 0.4s ease 0.08s;
}
.btn-fill:hover span{ color:#fff; }
.btn-fill:hover svg path{ stroke:#fff; }

.btn-text{ font-size:14px; text-decoration:none; color: var(--muted); border-bottom:1px solid transparent; transition: all 0.3s ease; }
.btn-text:hover{ color: var(--ink); border-color: var(--green); }

.chip{

.chip::before{ content:''; width:5px; height:5px; border-radius:50%; background:var(--green); margin-right:8px; }
