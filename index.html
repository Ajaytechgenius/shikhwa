<!DOCTYPE html>
<html>
<head>
<style>
body{
  background:#f7f4ee;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:sans-serif;
  gap:24px;
}

.btn-fill{
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 17px 40px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  overflow: hidden;
  isolation: isolate;
  background: #2ecc71;           /* the exact flat vivid green from your reference */
  transform: translateZ(0);
  box-shadow: 0 10px 28px rgba(46,204,113,0.35);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.btn-fill:hover{ transform: translateY(-2px); box-shadow: 0 16px 36px rgba(13,15,20,0.25); }

.btn-fill .fill{
  position:absolute;
  inset:-3px;
  border-radius: inherit;
  background: #0d0f14;           /* rich near-black, matches your original reference */
  clip-path: circle(0% at var(--x,50%) var(--y,50%));
  transition: clip-path 0.55s cubic-bezier(0.22,1,0.36,1);
  z-index:1;
}
.btn-fill:hover .fill{ clip-path: circle(200% at var(--x,50%) var(--y,50%)); }

.btn-fill span{
  position:relative;
  z-index:2;
  color:#0d0f14;
  font-weight:700;
  font-size:15px;
  transition: color 0.4s ease 0.08s;
}
.btn-fill:hover span{ color:#fff; }
</style>
</head>
<body>

<button class="btn-fill">
  <span>Open App</span>
</button>

<script>
document.querySelectorAll('.btn-fill').forEach(btn=>{
  const set = e=>{
    const r = btn.getBoundingClientRect();
    btn.style.setProperty('--x', ((e.clientX-r.left)/r.width)*100+'%');
    btn.style.setProperty('--y', ((e.clientY-r.top)/r.height)*100+'%');
  };
  btn.addEventListener('mouseenter', set);
});
</script>
</body>
</html>
